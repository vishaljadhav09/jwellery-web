[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/lib/**"]

[dev]
  command = "vite"
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
